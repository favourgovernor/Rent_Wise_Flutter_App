name: rentwise_app
description: A property management system for landlords
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # UI & Design
  google_fonts: ^8.0.2
  flutter_svg: ^2.0.7
  fl_chart: ^1.2.0
  shimmer: ^3.0.0
  
  # State Management & Storage
  provider: ^6.1.0
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^10.0.0
  
  # Networking
  http: ^1.1.0
  dio: ^5.3.3
  
  # Utilities
  intl: ^0.20.2
  url_launcher: ^6.1.14
  image_picker: ^1.0.4
  pinput: ^6.0.2
  
  # Navigation
  go_router: ^17.2.0
  
 
  
  # Forms & Validation
  flutter_form_builder: ^10.3.0+2
  form_builder_validators: ^11.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  
  # Add assets folder
  assets:
    - assets/images/
    - assets/icons/